<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Group Hub | Educational Collaboration Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-container h1 {
            color: #2a5298;
            margin-bottom: 10px;
        }

        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .login-container button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .study-app {
            display: none;
            width: 100%;
            height: 100vh;
        }

        .app-container {
            display: flex;
            height: 100%;
        }

        .sidebar {
            width: 320px;
            background: #1e293b;
            color: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        .groups-section, .students-section, .previous-users-section {
            padding: 20px;
            border-bottom: 1px solid #334155;
        }

        .section-title {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 12px;
        }

        .group-item, .student-item, .previous-user-item {
            padding: 12px;
            margin: 8px 0;
            background: #334155;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-item:hover, .student-item:hover, .previous-user-item:hover {
            background: #475569;
            transform: translateX(5px);
        }

        .group-item.active {
            background: #2a5298;
            border-left: 4px solid #60a5fa;
        }

        .group-info {
            flex: 1;
        }

        .group-name {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .group-subject {
            font-size: 0.7em;
            opacity: 0.7;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }

        .chat-header {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            color: #1e293b;
        }

        .delete-chat-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .delete-chat-btn:hover {
            background: #dc2626;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            gap: 12px;
            margin-bottom: 6px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .message-username {
            font-weight: bold;
            color: #2a5298;
        }

        .message-time {
            font-size: 0.7em;
            color: #94a3b8;
        }

        .message-text {
            color: #334155;
            word-wrap: break-word;
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            display: inline-block;
            max-width: 70%;
        }

        .message-image {
            max-width: 300px;
            max-height: 300px;
            border-radius: 12px;
            cursor: pointer;
        }

        .system-message {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 10px;
        }

        .delete-btn {
            display: inline-block;
            margin-left: 10px;
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7em;
        }

        .input-area {
            background: white;
            padding: 20px 30px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .upload-btn {
            background: #10b981;
        }

        .typing-indicator {
            padding: 5px 30px;
            color: #94a3b8;
            font-style: italic;
        }

        .offline-badge {
            background: #f59e0b;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 280px; }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <h1>📚 Study Group Hub</h1>
        <div class="subtitle">Connect with classmates anytime</div>
        <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="30">
        <button onclick="joinStudySession()">Join Study Session →</button>
        <div style="margin-top: 15px; font-size: 0.75em; color: #888;">
            Messages go to offline users • Anyone can delete messages
        </div>
    </div>

    <div class="study-app" id="studyApp">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>📖 Study Groups</h2>
                    <p>Collaborate with peers</p>
                </div>
                <div class="groups-section">
                    <div class="section-title">📌 ACTIVE GROUPS</div>
                    <div id="groupsList"></div>
                </div>
                <div class="students-section">
                    <div class="section-title">🟢 ONLINE NOW</div>
                    <div id="studentsList"></div>
                </div>
                <div class="previous-users-section">
                    <div class="section-title">📨 PREVIOUS STUDENTS</div>
                    <div id="previousUsersList"></div>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-header">
                    <h3 id="currentGroupName">General Study Hall</h3>
                    <div>
                        <button class="delete-chat-btn" id="deleteChatBtn" style="display:none;" onclick="deleteEntireChat()">🗑️ Delete Entire Chat</button>
                        <span class="chat-badge" id="chatTypeBadge">Study Group</span>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">📎 Share</button>
                    <button onclick="sendMessage()">Send →</button>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentGroup = 'general-study', privateChatWith = null;
        
        function joinStudySession() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return alert('Please enter your name');
            
            currentUser = username;
            socket = io();
            socket.emit('student-join', username);
            setupSocketListeners();
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('studyApp').style.display = 'block';
        }
        
        function setupSocketListeners() {
            socket.on('study-groups', (groups) => updateGroupsList(groups));
            socket.on('online-students', (students) => updateStudentsList(students));
            socket.on('all-users', (users) => updatePreviousUsersList(users));
            socket.on('message-history', (messages) => displayMessages(messages));
            socket.on('message', (msg) => addMessage(msg));
            socket.on('private-message', (msg) => addPrivateMessage(msg));
            socket.on('offline-messages', (messages) => {
                messages.forEach(msg => addMessage(msg));
                alert(`You have ${messages.length} new messages from when you were offline!`);
            });
            socket.on('message-deleted', (data) => removeMessage(data.messageId));
            socket.on('chat-deleted', (data) => {
                if (privateChatWith === data.targetUsername) {
                    document.getElementById('messagesContainer').innerHTML = '<div class="system-message">✨ Chat history cleared ✨</div>';
                }
            });
            socket.on('user-typing', (data) => showTyping(data));
            socket.on('group-switched', (data) => {
                currentGroup = data.groupId;
                document.getElementById('currentGroupName').innerText = data.groupName;
                privateChatWith = null;
                document.getElementById('chatTypeBadge').innerHTML = 'Study Group';
                document.getElementById('deleteChatBtn').style.display = 'none';
            });
            socket.on('private-history', (data) => {
                displayMessages(data.messages);
            });
            
            // Get all previous users
            socket.emit('get-all-users');
        }
        
        function updateGroupsList(groups) {
            const container = document.getElementById('groupsList');
            container.innerHTML = groups.map(group => `
                <div class="group-item ${group.id === currentGroup ? 'active' : ''}" onclick="switchGroup('${group.id}')">
                    <div class="group-info">
                        <div class="group-name">${escapeHtml(group.name)}</div>
                        <div class="group-subject">${escapeHtml(group.subject)}</div>
                    </div>
                    <span class="group-badge">${group.memberCount}</span>
                </div>
            `).join('');
        }
        
        function updateStudentsList(students) {
            const container = document.getElementById('studentsList');
            const filtered = students.filter(s => s !== currentUser);
            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding:10px;text-align:center;opacity:0.6">No one online</div>';
                return;
            }
            container.innerHTML = filtered.map(student => `
                <div class="student-item" onclick="startPrivateChat('${escapeHtml(student)}')">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div style="width:8px;height:8px;background:#4ade80;border-radius:50%;"></div>
                        <span>${escapeHtml(student)}</span>
                    </div>
                    <span style="font-size:0.7em;">💬 Message</span>
                </div>
            `).join('');
        }
        
        function updatePreviousUsersList(users) {
            const container = document.getElementById('previousUsersList');
            if (users.length === 0) {
                container.innerHTML = '<div style="padding:10px;text-align:center;opacity:0.6">No previous students</div>';
                return;
            }
            container.innerHTML = users.map(user => `
                <div class="previous-user-item" onclick="startPrivateChat('${escapeHtml(user)}')">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span>📬 ${escapeHtml(user)}</span>
                    </div>
                    <span style="font-size:0.7em;">Message</span>
                </div>
            `).join('');
        }
        
        function switchGroup(groupId) {
            if (groupId === currentGroup) return;
            currentGroup = groupId;
            privateChatWith = null;
            document.getElementById('chatTypeBadge').innerHTML = 'Study Group';
            document.getElementById('deleteChatBtn').style.display = 'none';
            socket.emit('switch-group', groupId);
            document.getElementById('messagesContainer').innerHTML = '<div class="system-message">Loading study group...</div>';
        }
        
        function startPrivateChat(username) {
            if (username === currentUser) return;
            privateChatWith = username;
            currentGroup = null;
            document.getElementById('currentGroupName').innerHTML = `💬 Private: ${username}`;
            document.getElementById('chatTypeBadge').innerHTML = 'Private Chat';
            document.getElementById('deleteChatBtn').style.display = 'inline-block';
            document.getElementById('messagesContainer').innerHTML = '<div class="system-message">Loading conversation...</div>';
            socket.emit('get-private-history', username);
        }
        
        function deleteEntireChat() {
            if (privateChatWith && confirm(`Delete entire chat history with ${privateChatWith}? This cannot be undone.`)) {
                socket.emit('delete-private-chat', { targetUsername: privateChatWith });
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            if (privateChatWith) {
                socket.emit('send-private', { targetUsername: privateChatWith, text: text });
            } else {
                socket.emit('send-message', { text: text });
            }
            input.value = '';
            socket.emit('typing', { isTyping: false });
        }
        
        function deleteMessage(messageId, isPrivate, targetUsername, groupId) {
            if (confirm('Delete this message?')) {
                socket.emit('delete-message', { messageId, isPrivate, targetUsername, groupId });
            }
        }
        
        function removeMessage(messageId) {
            const messages = document.querySelectorAll('.message');
            messages.forEach(msg => {
                if (msg.dataset.messageId === messageId) {
                    msg.remove();
                }
            });
        }
        
        function uploadImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 5 * 1024 * 1024) return alert('File too large (max 5MB)');
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imageData = { image: e.target.result };
                    if (privateChatWith) {
                        imageData.isPrivate = true;
                        imageData.targetUsername = privateChatWith;
                    }
                    socket.emit('send-image', imageData);
                };
                reader.readAsDataURL(file);
                input.value = '';
            }
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
            else {
                socket.emit('typing', { 
                    isTyping: true, 
                    targetUsername: privateChatWith, 
                    isPrivate: !!privateChatWith 
                });
                clearTimeout(window.typingTimeout);
                window.typingTimeout = setTimeout(() => {
                    socket.emit('typing', { isTyping: false });
                }, 1000);
            }
        }
        
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="system-message">✨ No messages yet ✨</div>';
                return;
            }
            messages.forEach(msg => addMessageToContainer(msg));
            container.scrollTop = container.scrollHeight;
        }
        
        function addMessage(msg) {
            addMessageToContainer(msg);
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }
        
        function addPrivateMessage(msg) {
            if (privateChatWith === msg.username || privateChatWith === msg.targetUsername) {
                addMessageToContainer(msg);
                const container = document.getElementById('messagesContainer');
                container.scrollTop = container.scrollHeight;
            }
        }
        
        function addMessageToContainer(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message';
            div.dataset.messageId = msg.id;
            
            if (msg.isSystem) {
                div.innerHTML = `<div class="system-message">${escapeHtml(msg.text)}</div>`;
            } else if (msg.isImage) {
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-username">${escapeHtml(msg.username)}</span>
                        <span class="message-time">${escapeHtml(msg.time)}</span>
                        <span class="delete-btn" onclick="deleteMessage('${msg.id}', ${msg.isPrivate || false}, '${msg.targetUsername || ''}', '${currentGroup}')">🗑️ Delete</span>
                    </div>
                    <img src="${msg.image}" class="message-image" onclick="window.open(this.src)">
                `;
            } else {
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-username">${escapeHtml(msg.username)}</span>
                        <span class="message-time">${escapeHtml(msg.time)}</span>
                        <span class="delete-btn" onclick="deleteMessage('${msg.id}', ${msg.isPrivate || false}, '${msg.targetUsername || ''}', '${currentGroup}')">🗑️ Delete</span>
                    </div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                `;
            }
            container.appendChild(div);
        }
        
        function showTyping(data) {
            const indicator = document.getElementById('typingIndicator');
            if (data.isTyping && data.username !== currentUser) {
                indicator.textContent = `${escapeHtml(data.username)} is typing...`;
            } else {
                indicator.textContent = '';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
