<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Study Group Hub | Password Protected</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Password Gate */
        .password-gate {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-gate .lock-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .password-gate h2 {
            color: #1e293b;
            margin-bottom: 10px;
        }

        .password-gate p {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 0.9em;
        }

        .password-gate input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .password-gate input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-gate button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .password-gate button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85em;
            margin-top: 10px;
            display: none;
        }

        /* Login Screen (after password) */
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.5s ease;
            display: none;
        }

        .login-container h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .login-container input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
        }

        .login-container button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .study-app {
            display: none;
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .app-container {
            display: flex;
            height: 100%;
        }

        .sidebar {
            width: 320px;
            background: #1e293b;
            color: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        .groups-section, .students-section, .previous-users-section {
            padding: 20px;
            border-bottom: 1px solid #334155;
        }

        .section-title {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 12px;
        }

        .group-item, .student-item, .previous-user-item {
            padding: 12px;
            margin: 8px 0;
            background: #334155;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-item:hover, .student-item:hover, .previous-user-item:hover {
            background: #475569;
            transform: translateX(5px);
        }

        .group-item.active {
            background: #2a5298;
            border-left: 4px solid #60a5fa;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }

        .chat-header {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-chat-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-bubble {
            display: inline-block;
            max-width: 70%;
            background: white;
            border-radius: 20px;
            padding: 10px 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-header {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .message-username {
            font-weight: bold;
            color: #2a5298;
        }

        .message-time {
            font-size: 0.7em;
            color: #94a3b8;
        }

        .message-text {
            color: #334155;
            word-wrap: break-word;
        }

        .message-image {
            max-width: 300px;
            max-height: 300px;
            border-radius: 12px;
            cursor: pointer;
        }

        .system-message {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 10px;
        }

        .reactions-container {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .reaction-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .reaction-badge:hover {
            background: #e2e8f0;
            transform: scale(1.05);
        }

        .reaction-badge.active {
            background: #dbeafe;
            border-color: #667eea;
        }

        .reaction-picker {
            position: fixed;
            background: white;
            border-radius: 40px;
            padding: 10px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
            z-index: 1000;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.2s;
            pointer-events: none;
        }

        .reaction-picker.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .reaction-option {
            font-size: 1.5em;
            cursor: pointer;
            padding: 5px;
            background: none;
            border: none;
            transition: transform 0.2s;
        }

        .reaction-option:hover {
            transform: scale(1.2);
        }

        .delete-btn {
            display: inline-block;
            margin-left: 10px;
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7em;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .delete-btn {
            opacity: 1;
        }

        .input-area {
            background: white;
            padding: 20px 30px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .upload-btn {
            background: #10b981;
        }

        .typing-indicator {
            padding: 5px 30px;
            color: #94a3b8;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <!-- Password Gate -->
    <div class="password-gate" id="passwordGate">
        <div class="lock-icon">🔒</div>
        <h2>Private Study Room</h2>
        <p>This chat room is password protected</p>
        <input type="password" id="passwordInput" placeholder="Enter password" onkeypress="if(event.key==='Enter') verifyPassword()">
        <button onclick="verifyPassword()">Unlock →</button>
        <div class="error-message" id="passwordError">Incorrect password. Try again.</div>
    </div>

    <!-- Login Screen (after password) -->
    <div class="login-container" id="loginContainer">
        <h1>📚 Study Group Hub</h1>
        <p style="margin-bottom: 20px;">😊 React to messages with emojis!</p>
        <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="30">
        <button onclick="joinStudySession()">Join Study Session →</button>
    </div>

    <!-- Main Study App -->
    <div class="study-app" id="studyApp">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>📖 Study Groups</h2>
                    <p>React with 👍 ❤️ 😂 😮 😢</p>
                </div>
                <div class="groups-section">
                    <div class="section-title">📌 ACTIVE GROUPS</div>
                    <div id="groupsList"></div>
                </div>
                <div class="students-section">
                    <div class="section-title">🟢 ONLINE NOW</div>
                    <div id="studentsList"></div>
                </div>
                <div class="previous-users-section">
                    <div class="section-title">📨 PREVIOUS STUDENTS</div>
                    <div id="previousUsersList"></div>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-header">
                    <h3 id="currentGroupName">General Study Hall</h3>
                    <button class="delete-chat-btn" id="deleteChatBtn" style="display:none;" onclick="deleteEntireChat()">🗑️ Delete Chat</button>
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">📎 Share</button>
                    <button onclick="sendMessage()">Send →</button>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUser, currentGroup = 'general-study', privateChatWith = null;
        let reactionsData = {};
        let currentReactionPicker = null;
        let passwordVerified = false;
        const availableEmojis = ['👍', '❤️', '😂', '😮', '😢', '🎉', '🔥', '💯', '👏', '🙏', '😍', '🤔', '😎', '🥳', '😭', '💀', '✨', '⭐'];

        function verifyPassword() {
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('passwordError');
            
            if (password === 'monster') {
                passwordVerified = true;
                document.getElementById('passwordGate').style.display = 'none';
                document.getElementById('loginContainer').style.display = 'block';
                errorDiv.style.display = 'none';
            } else {
                errorDiv.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function joinStudySession() {
            if (!passwordVerified) return;
            
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return alert('Please enter your name');
            
            currentUser = username;
            socket = io();
            
            // No need to verify password again since it's already done
            socket.emit('student-join', username);
            setupSocketListeners();
            
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('studyApp').style.display = 'block';
        }

        function setupSocketListeners() {
            socket.on('study-groups', (groups) => updateGroupsList(groups));
            socket.on('online-students', (students) => updateStudentsList(students));
            socket.on('all-users', (users) => updatePreviousUsersList(users));
            socket.on('message-history', (data) => {
                if (data.reactions) reactionsData = data.reactions;
                displayMessages(data.messages);
            });
            socket.on('message', (msg) => addMessage(msg));
            socket.on('private-message', (msg) => addPrivateMessage(msg));
            socket.on('reaction-updated', (data) => updateReaction(data));
            socket.on('offline-messages', (messages) => {
                messages.forEach(msg => addMessage(msg));
                alert(`You have ${messages.length} new messages from offline!`);
            });
            socket.on('message-deleted', (data) => removeMessage(data.messageId));
            socket.on('chat-deleted', (data) => {
                if (privateChatWith === data.targetUsername) {
                    document.getElementById('messagesContainer').innerHTML = '<div class="system-message">✨ Chat history cleared ✨</div>';
                }
            });
            socket.on('user-typing', (data) => showTyping(data));
            socket.on('group-switched', (data) => {
                currentGroup = data.groupId;
                document.getElementById('currentGroupName').innerText = data.groupName;
                privateChatWith = null;
                document.getElementById('deleteChatBtn').style.display = 'none';
            });
            socket.on('private-history', (data) => {
                displayMessages(data.messages);
            });
            socket.emit('get-all-users');
        }

        function updateReaction(data) {
            const messageDiv = document.querySelector(`.message[data-message-id="${data.messageId}"]`);
            if (!messageDiv) return;

            let reactionsContainer = messageDiv.querySelector('.reactions-container');
            if (!reactionsContainer) {
                reactionsContainer = document.createElement('div');
                reactionsContainer.className = 'reactions-container';
                messageDiv.appendChild(reactionsContainer);
            }

            if (!reactionsData[data.messageId]) reactionsData[data.messageId] = {};
            if (!reactionsData[data.messageId][data.emoji]) reactionsData[data.messageId][data.emoji] = [];

            if (data.action === 'add') {
                if (!reactionsData[data.messageId][data.emoji].includes(data.username)) {
                    reactionsData[data.messageId][data.emoji].push(data.username);
                }
            } else if (data.action === 'remove') {
                const index = reactionsData[data.messageId][data.emoji].indexOf(data.username);
                if (index !== -1) reactionsData[data.messageId][data.emoji].splice(index, 1);
                if (reactionsData[data.messageId][data.emoji].length === 0) {
                    delete reactionsData[data.messageId][data.emoji];
                }
            }

            updateReactionsDisplay(messageDiv, data.messageId);
        }

        function updateReactionsDisplay(messageDiv, messageId) {
            let reactionsContainer = messageDiv.querySelector('.reactions-container');
            if (!reactionsContainer) {
                reactionsContainer = document.createElement('div');
                reactionsContainer.className = 'reactions-container';
                messageDiv.appendChild(reactionsContainer);
            }
            reactionsContainer.innerHTML = '';

            const reactions = reactionsData[messageId] || {};
            Object.entries(reactions).forEach(([emoji, users]) => {
                const reactionBadge = document.createElement('div');
                reactionBadge.className = 'reaction-badge';
                if (users.includes(currentUser)) reactionBadge.classList.add('active');
                reactionBadge.innerHTML = `
                    <span class="reaction-emoji">${emoji}</span>
                    <span class="reaction-count">${users.length}</span>
                `;
                reactionBadge.onclick = (e) => {
                    e.stopPropagation();
                    if (users.includes(currentUser)) {
                        socket.emit('remove-reaction', {
                            messageId: messageId,
                            emoji: emoji,
                            isPrivate: !!privateChatWith,
                            targetUsername: privateChatWith
                        });
                    } else {
                        socket.emit('add-reaction', {
                            messageId: messageId,
                            emoji: emoji,
                            isPrivate: !!privateChatWith,
                            targetUsername: privateChatWith
                        });
                    }
                };
                reactionsContainer.appendChild(reactionBadge);
            });
        }

        function showReactionPicker(messageId, event) {
            if (currentReactionPicker) {
                currentReactionPicker.remove();
                currentReactionPicker = null;
            }

            const picker = document.createElement('div');
            picker.className = 'reaction-picker';
            availableEmojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'reaction-option';
                btn.textContent = emoji;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    socket.emit('add-reaction', {
                        messageId: messageId,
                        emoji: emoji,
                        isPrivate: !!privateChatWith,
                        targetUsername: privateChatWith
                    });
                    picker.remove();
                    currentReactionPicker = null;
                };
                picker.appendChild(btn);
            });

            const rect = event.target.getBoundingClientRect();
            picker.style.position = 'fixed';
            picker.style.top = `${rect.top - 50}px`;
            picker.style.left = `${rect.left}px`;
            document.body.appendChild(picker);
            setTimeout(() => picker.classList.add('show'), 10);
            currentReactionPicker = picker;

            const closePicker = (e) => {
                if (!picker.contains(e.target)) {
                    picker.remove();
                    currentReactionPicker = null;
                    document.removeEventListener('click', closePicker);
                }
            };
            setTimeout(() => document.addEventListener('click', closePicker), 100);
        }

        function updateGroupsList(groups) {
            const container = document.getElementById('groupsList');
            container.innerHTML = groups.map(group => `
                <div class="group-item ${group.id === currentGroup ? 'active' : ''}" onclick="switchGroup('${group.id}')">
                    <span>📚 ${group.name}</span>
                    <span>${group.memberCount}</span>
                </div>
            `).join('');
        }

        function updateStudentsList(students) {
            const container = document.getElementById('studentsList');
            const filtered = students.filter(s => s !== currentUser);
            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding:10px;text-align:center;opacity:0.6">No one online</div>';
                return;
            }
            container.innerHTML = filtered.map(student => `
                <div class="student-item" onclick="startPrivateChat('${escapeHtml(student)}')">
                    <span>🟢 ${escapeHtml(student)}</span>
                    <span>💬</span>
                </div>
            `).join('');
        }

        function updatePreviousUsersList(users) {
            const container = document.getElementById('previousUsersList');
            if (users.length === 0) {
                container.innerHTML = '<div style="padding:10px;text-align:center;opacity:0.6">No previous students</div>';
                return;
            }
            container.innerHTML = users.map(user => `
                <div class="previous-user-item" onclick="startPrivateChat('${escapeHtml(user)}')">
                    <span>📬 ${escapeHtml(user)}</span>
                    <span>Message</span>
                </div>
            `).join('');
        }

        function switchGroup(groupId) {
            if (groupId === currentGroup) return;
            currentGroup = groupId;
            privateChatWith = null;
            document.getElementById('deleteChatBtn').style.display = 'none';
            socket.emit('switch-group', groupId);
            document.getElementById('messagesContainer').innerHTML = '<div class="system-message">Loading messages...</div>';
        }

        function startPrivateChat(username) {
            if (username === currentUser) return;
            privateChatWith = username;
            currentGroup = null;
            document.getElementById('currentGroupName').innerHTML = `💬 Private with ${username}`;
            document.getElementById('deleteChatBtn').style.display = 'inline-block';
            document.getElementById('messagesContainer').innerHTML = '<div class="system-message">Loading conversation...</div>';
            socket.emit('get-private-history', username);
        }

        function deleteEntireChat() {
            if (privateChatWith && confirm(`Delete entire chat with ${privateChatWith}?`)) {
                socket.emit('delete-private-chat', { targetUsername: privateChatWith });
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            if (privateChatWith) {
                socket.emit('send-private', { targetUsername: privateChatWith, text: text });
            } else {
                socket.emit('send-message', { text: text });
            }
            input.value = '';
            socket.emit('typing', { isTyping: false });
        }

        function deleteMessage(messageId, isPrivate) {
            if (confirm('Delete this message?')) {
                socket.emit('delete-message', { 
                    messageId, 
                    isPrivate: isPrivate,
                    targetUsername: privateChatWith,
                    groupId: currentGroup
                });
            }
        }

        function removeMessage(messageId) {
            const msg = document.querySelector(`.message[data-message-id="${messageId}"]`);
            if (msg) msg.remove();
        }

        function uploadImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 5 * 1024 * 1024) return alert('File too large');
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imageData = { image: e.target.result };
                    if (privateChatWith) {
                        imageData.isPrivate = true;
                        imageData.targetUsername = privateChatWith;
                    }
                    socket.emit('send-image', imageData);
                };
                reader.readAsDataURL(file);
                input.value = '';
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
            else {
                socket.emit('typing', { 
                    isTyping: true, 
                    targetUsername: privateChatWith, 
                    isPrivate: !!privateChatWith 
                });
                clearTimeout(window.typingTimeout);
                window.typingTimeout = setTimeout(() => {
                    socket.emit('typing', { isTyping: false });
                }, 1000);
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="system-message">✨ No messages yet ✨</div>';
                return;
            }
            messages.forEach(msg => addMessageToContainer(msg));
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(msg) {
            addMessageToContainer(msg);
            document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
        }

        function addPrivateMessage(msg) {
            if (privateChatWith === msg.username || privateChatWith === msg.targetUsername) {
                addMessageToContainer(msg);
                document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
            }
        }

        function addMessageToContainer(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message';
            div.setAttribute('data-message-id', msg.id);

            if (msg.isSystem) {
                div.innerHTML = `<div class="system-message">${escapeHtml(msg.text)}</div>`;
            } else if (msg.isImage) {
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-username">${escapeHtml(msg.username)}</span>
                        <span class="message-time">${escapeHtml(msg.time)}</span>
                        <span class="delete-btn" onclick="deleteMessage('${msg.id}', ${msg.isPrivate || false})">Delete</span>
                    </div>
                    <img src="${msg.image}" class="message-image" onclick="window.open(this.src)">
                `;
            } else {
                const filteredBadge = msg.wasFiltered ? '<span style="background:#f59e0b; padding:2px 6px; border-radius:12px; font-size:0.7em;">⚠️</span>' : '';
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-username">${escapeHtml(msg.username)}</span>
                        <span class="message-time">${escapeHtml(msg.time)}</span>
                        ${filteredBadge}
                        <span class="delete-btn" onclick="deleteMessage('${msg.id}', ${msg.isPrivate || false})">Delete</span>
                    </div>
                    <div class="message-bubble" onclick="showReactionPicker('${msg.id}', event)">
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
            }

            container.appendChild(div);

            if (reactionsData[msg.id]) {
                updateReactionsDisplay(div, msg.id);
            } else if (!msg.isSystem && !msg.isImage) {
                const reactionsContainer = document.createElement('div');
                reactionsContainer.className = 'reactions-container';
                div.appendChild(reactionsContainer);
            }
        }

        function showTyping(data) {
            const indicator = document.getElementById('typingIndicator');
            if (data.isTyping && data.username !== currentUser) {
                indicator.textContent = `${escapeHtml(data.username)} is typing...`;
            } else {
                indicator.textContent = '';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key on password input
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyPassword();
        });
    </script>
</body>
</html>
