<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Advanced Chat Room | Groups & Private Chats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 20px;
            background: #1a2632;
            border-bottom: 1px solid #3e5a6b;
        }
        .sidebar-header h2 { font-size: 1.3em; margin-bottom: 5px; }
        .sidebar-header p { font-size: 0.8em; opacity: 0.7; }
        
        /* Rooms Section */
        .rooms-section, .users-section {
            padding: 15px;
            border-bottom: 1px solid #3e5a6b;
        }
        .section-title {
            font-size: 0.9em;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 10px;
        }
        .room-item, .user-item {
            padding: 10px;
            margin: 5px 0;
            background: #3e5a6b;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-item:hover, .user-item:hover { background: #4e6b7e; transform: translateX(5px); }
        .room-item.active { background: #667eea; }
        .room-badge {
            background: #1a2632;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7em;
        }
        
        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 { color: #333; }
        .chat-header .badge {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        
        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .message-username {
            font-weight: bold;
            color: #667eea;
        }
        .message-time {
            font-size: 0.7em;
            color: #999;
        }
        .message-text { color: #333; word-wrap: break-word; }
        .message-image {
            max-width: 300px;
            max-height: 300px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 5px;
        }
        .system-message {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 10px;
        }
        .filtered-badge {
            background: #ff9800;
            color: white;
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 10px;
        }
        .private-badge {
            background: #4caf50;
            color: white;
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        /* Input Area */
        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }
        .input-area input[type="text"]:focus { border-color: #667eea; }
        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .upload-btn { background: #4caf50; }
        
        .typing-indicator {
            padding: 5px 20px;
            color: #999;
            font-style: italic;
            font-size: 0.8em;
        }
        
        /* Login */
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        .chat-room { display: none; width: 100%; }
        
        .create-group {
            margin-top: 10px;
            display: flex;
            gap: 5px;
        }
        .create-group input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }
        .create-group button {
            padding: 8px 15px;
            font-size: 0.8em;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 250px; }
            .message-image { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <h1>💬 Advanced Chat</h1>
        <p>Groups | Private Messages | Images</p>
        <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
        <button onclick="joinChat()">Join Chat →</button>
    </div>
    
    <div class="chat-room" id="chatRoom">
        <div class="app">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>💬 Chat Rooms</h2>
                    <p>Click a room to join</p>
                </div>
                <div class="rooms-section">
                    <div class="section-title">📌 PUBLIC ROOMS</div>
                    <div id="roomsList"></div>
                    <div class="create-group">
                        <input type="text" id="newGroupName" placeholder="New group name">
                        <button onclick="createGroup()">+ Create</button>
                    </div>
                </div>
                <div class="users-section">
                    <div class="section-title">👥 ONLINE USERS</div>
                    <div id="onlineUsersList"></div>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-header">
                    <h3 id="currentRoomName">General Chat</h3>
                    <div class="badge" id="roomTypeBadge">Public</div>
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">📷 Image</button>
                    <button onclick="sendMessage()">Send →</button>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket, currentUsername, currentRoom = 'general', privateChatTarget = null;
        
        function joinChat() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return alert('Enter username');
            currentUsername = username;
            socket = io();
            socket.emit('user-join', username);
            setupSocketListeners();
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('chatRoom').style.display = 'block';
        }
        
        function setupSocketListeners() {
            socket.on('rooms-list', (rooms) => updateRoomsList(rooms));
            socket.on('online-users', (users) => updateOnlineUsers(users));
            socket.on('message-history', (messages) => displayMessages(messages));
            socket.on('message', (msg) => addMessage(msg));
            socket.on('private-message', (msg) => addPrivateMessage(msg));
            socket.on('user-typing', (data) => showTyping(data));
            socket.on('room-switched', (data) => {
                currentRoom = data.roomId;
                document.getElementById('currentRoomName').innerText = data.roomName;
                privateChatTarget = null;
            });
            socket.on('new-room', (room) => addRoomToList(room));
            socket.on('group-invite', (invite) => {
                if (confirm(`${invite.inviter} invited you to join "${invite.groupName}". Accept?`)) {
                    socket.emit('accept-invite', { groupId: invite.groupId });
                }
            });
            socket.on('group-created', (group) => alert(`Group "${group.name}" created!`));
            socket.on('error', (msg) => alert(msg));
        }
        
        function updateRoomsList(rooms) {
            const container = document.getElementById('roomsList');
            container.innerHTML = rooms.map(room => `
                <div class="room-item ${room.id === currentRoom ? 'active' : ''}" onclick="switchRoom('${room.id}')">
                    <span>${room.type === 'public' ? '#' : '👥'} ${room.name}</span>
                    <span class="room-badge">${room.memberCount}</span>
                </div>
            `).join('');
        }
        
        function addRoomToList(room) {
            const container = document.getElementById('roomsList');
            container.innerHTML += `
                <div class="room-item" onclick="switchRoom('${room.id}')">
                    <span>👥 ${room.name}</span>
                    <span class="room-badge">1</span>
                </div>
            `;
        }
        
        function updateOnlineUsers(users) {
            const container = document.getElementById('onlineUsersList');
            container.innerHTML = users.filter(u => u !== currentUsername).map(user => `
                <div class="user-item" onclick="startPrivateChat('${user}')">
                    <span>💬 ${user}</span>
                    <span class="room-badge">PM</span>
                </div>
            `).join('');
            if (users.length === 0) container.innerHTML = '<div style="padding:10px;text-align:center">No one online</div>';
        }
        
        function switchRoom(roomId) {
            if (roomId === currentRoom) return;
            currentRoom = roomId;
            privateChatTarget = null;
            document.getElementById('currentRoomName').innerText = roomId === 'general' ? 'General Chat' : 
                roomId === 'random' ? 'Random' : roomId === 'gaming' ? 'Gaming' : roomId;
            socket.emit('switch-room', roomId);
            document.getElementById('messagesContainer').innerHTML = '<div class="system-message">Loading messages...</div>';
        }
        
        function startPrivateChat(username) {
            if (username === currentUsername) return;
            privateChatTarget = username;
            currentRoom = null;
            document.getElementById('currentRoomName').innerHTML = `💬 Private with ${username}`;
            document.getElementById('roomTypeBadge').innerHTML = 'Private Chat';
            document.getElementById('messagesContainer').innerHTML = '<div class="system-message">Loading private messages...</div>';
            socket.emit('get-private-history', username);
        }
        
        function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) return alert('Enter group name');
            socket.emit('create-group', name);
            document.getElementById('newGroupName').value = '';
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            if (privateChatTarget) {
                socket.emit('send-private', { targetUsername: privateChatTarget, text: text });
            } else {
                socket.emit('send-message', { text: text });
            }
            input.value = '';
            socket.emit('typing', { isTyping: false });
        }
        
        function uploadImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 5 * 1024 * 1024) return alert('Max 5MB');
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imageData = { image: e.target.result };
                    if (privateChatTarget) {
                        imageData.isPrivate = true;
                        imageData.targetUsername = privateChatTarget;
                    }
                    socket.emit('send-image', imageData);
                };
                reader.readAsDataURL(file);
                input.value = '';
            }
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
            else {
                socket.emit('typing', { isTyping: true, targetUsername: privateChatTarget, isPrivate: !!privateChatTarget });
                clearTimeout(window.typingTimeout);
                window.typingTimeout = setTimeout(() => {
                    socket.emit('typing', { isTyping: false });
                }, 1000);
            }
        }
        
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="system-message">✨ No messages yet ✨</div>';
                return;
            }
            messages.forEach(msg => addMessageToContainer(msg));
            container.scrollTop = container.scrollHeight;
        }
        
        function addMessage(msg) {
            addMessageToContainer(msg);
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }
        
        function addPrivateMessage(msg) {
            if (privateChatTarget === msg.username || privateChatTarget === msg.targetUsername) {
                addMessageToContainer(msg);
                const container = document.getElementById('messagesContainer');
                container.scrollTop = container.scrollHeight;
            }
        }
        
        function addMessageToContainer(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message';
            
            if (msg.isSystem) {
                div.innerHTML = `<div class="system-message">${escapeHtml(msg.text)}</div>`;
            } else if (msg.isImage) {
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-username">${escapeHtml(msg.username)}</span>
                        <span class="message-time">${escapeHtml(msg.time)}</span>
                    </div>
                    <img src="${msg.image}" class="message-image" onclick="window.open(this.src)">
                `;
            } else {
                const filteredBadge = msg.wasFiltered ? '<span class="filtered-badge">🔞 Filtered</span>' : '';
                const privateBadge = msg.isPrivate ? '<span class="private-badge">🔒 Private</span>' : '';
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-username">${escapeHtml(msg.username)}</span>
                        <span class="message-time">${escapeHtml(msg.time)}</span>
                        ${filteredBadge}
                        ${privateBadge}
                    </div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                `;
            }
            container.appendChild(div);
        }
        
        function showTyping(data) {
            const indicator = document.getElementById('typingIndicator');
            if (data.isTyping && data.username !== currentUsername) {
                indicator.textContent = `${escapeHtml(data.username)} is typing...`;
            } else {
                indicator.textContent = '';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
